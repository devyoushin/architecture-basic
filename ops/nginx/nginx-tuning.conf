# Nginx high-load baseline.
# Validate with: nginx -t

worker_processes auto;
worker_rlimit_nofile 200000;

events {
    worker_connections 65535;
    multi_accept on;
    use epoll;
}

http {
    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 15s;
    keepalive_requests 10000;

    client_header_timeout 10s;
    client_body_timeout 10s;
    send_timeout 30s;
    reset_timedout_connection on;

    proxy_connect_timeout 3s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_buffering on;
    proxy_buffers 32 16k;
    proxy_busy_buffers_size 64k;

    upstream app_backend {
        zone app_backend 64k;
        least_conn;
        keepalive 256;

        server 10.0.10.10:8080 max_fails=3 fail_timeout=10s;
        server 10.0.10.11:8080 max_fails=3 fail_timeout=10s;
    }

    limit_req_zone $binary_remote_addr zone=per_ip:20m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:20m;

    server {
        listen 80 reuseport backlog=65535;

        access_log /var/log/nginx/access.log main buffer=256k flush=5s;
        error_log /var/log/nginx/error.log warn;

        location /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location / {
            limit_req zone=per_ip burst=100 nodelay;
            limit_conn conn_per_ip 100;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://app_backend;
        }
    }
}
