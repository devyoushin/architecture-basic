groups:
  - name: nginx-overload
    rules:
      - alert: NginxHigh5xxRate
        expr: |
          sum(rate(nginx_http_requests_total{status=~"5.."}[5m]))
          /
          sum(rate(nginx_http_requests_total[5m])) > 0.02
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Nginx 5xx rate is above 2%"
          runbook: "ops/runbooks/nginx-overload-response.md"

      - alert: NginxHighP95Latency
        expr: |
          histogram_quantile(0.95, sum(rate(nginx_http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Nginx p95 latency is above 1s"
          runbook: "ops/runbooks/nginx-overload-response.md"

      - alert: NginxConnectionSaturation
        expr: |
          nginx_connections_active / nginx_connections_limit > 0.8
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Nginx active connections exceed 80% of limit"
          runbook: "ops/runbooks/nginx-overload-response.md"
